<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Vest.IA</title>

    <link rel="icon" href="/static/logo.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="font-poppins min-h-screen overflow-hidden relative bg-[#0f0720]">

    <!-- PARTE DO FUNDO (Efeitos idênticos ao Login) -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-96 h-96 bg-purple-600 opacity-20 rounded-full blur-3xl top-[-100px] left-[-100px] animate-pulse"></div>
        <div class="absolute w-96 h-96 bg-fuchsia-500 opacity-20 rounded-full blur-3xl bottom-[-100px] right-[-100px] animate-pulse"></div>
    </div>

    <!-- PARTE DO CADASTRO -->
    <div class="relative z-10 min-h-screen flex items-center justify-center px-4">

        <!-- CARD COMPACTO -->
        <div class="w-full max-w-[360px] backdrop-blur-xl bg-white/10 border border-white/20 rounded-[2rem] shadow-2xl p-6 text-white">

            <!-- SEÇÃO DO TÍTULO/LOGO -->
            <div class="text-center mb-6">
                <img
                    src="/static/logo.png"
                    alt="Vest.IA"
                    class="w-32 mx-auto drop-shadow-2xl brightness-110"
                >
                <h2 class="text-xl font-semibold mt-3 text-white">
                    Criar Conta
                </h2>
            </div>

            <!-- FORMULÁRIO -->
            <form id="formCadastro" onsubmit="enviarCadastro(event)" class="space-y-4">
                <div>
                    <label class="block mb-1 text-xs text-blue-100 ml-1">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required
                        class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 placeholder-blue-100/30 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400 text-sm">
                </div>

                <div>
                    <label class="block mb-1 text-xs text-blue-100 ml-1">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required
                        class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 placeholder-blue-100/30 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400 text-sm">
                </div>

                <div>
                    <label class="block mb-1 text-xs text-blue-100 ml-1">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required
                        class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 placeholder-blue-100/30 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400 text-sm">
                </div>

                <button type="submit" id="btnCadastro"
                    class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:scale-[1.02] active:scale-95 transition duration-300 text-white py-3 rounded-xl font-semibold shadow-lg text-sm mt-2">
                    Criar Conta
                </button>
            </form>

            <form id="formCodigo" onsubmit="validarCodigo(event)" class="hidden space-y-4 text-center">
                <p class="text-sm text-blue-100 mb-4">
                    Enviamos um código de 6 dígitos para o seu e-mail. Digite-o abaixo.
                </p>
                <div>
                    <input type="text" id="codigo" placeholder="000000" maxlength="6" required
                        class="w-full text-center tracking-[0.5em] text-2xl px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400">
                </div>
                <button type="submit" id="btnCodigo"
                    class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:scale-[1.02] transition duration-300 text-white py-3 rounded-xl font-semibold shadow-lg text-sm">
                    Verificar e Entrar
                </button>
            </form>

            <div id="linkVoltar" class="mt-6 text-center text-xs text-blue-100">
                Já possui conta? <a href="/" class="font-semibold text-fuchsia-300 hover:text-fuchsia-200 transition">Fazer login</a>
            </div>

        </div> </div> <script>
        // Função do Toast (Notificação Elegante)
        function mostrarToast(mensagem, tipo = 'erro') {
            const toastAntigo = document.getElementById('meu-toast');
            if (toastAntigo) toastAntigo.remove();

            const toast = document.createElement('div');
            toast.id = 'meu-toast';
            const corFundo = tipo === 'sucesso' ? 'bg-green-500' : 'bg-red-500';
            const icone = tipo === 'sucesso' ? '✅' : '⚠️';

            toast.className = `fixed top-5 right-5 md:top-10 md:right-10 ${corFundo} text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-x-20 opacity-0 z-50 flex items-center gap-3`;
            toast.innerHTML = `<span class="text-xl">${icone}</span> <span class="font-medium text-sm md:text-base">${mensagem}</span>`;
            
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.remove('translate-x-20', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-20', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        // Função de Enviar Cadastro (ETAPA 1)
        function enviarCadastro(event) {
            event.preventDefault(); // IMPEDE O NAVEGADOR DE RECARREGAR A TELA

            const btn = document.getElementById('btnCadastro');
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            btn.innerText = "Enviando e-mail...";
            btn.disabled = true;

            fetch('/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    mostrarToast("Código enviado para seu e-mail!", "sucesso");
                    document.getElementById('formCadastro').classList.add('hidden');
                    document.getElementById('linkVoltar').classList.add('hidden');
                    document.getElementById('formCodigo').classList.remove('hidden');
                } else {
                    mostrarToast(data.mensagem, "erro");
                    btn.innerText = "Criar Conta";
                    btn.disabled = false;
                }
            })
            .catch(erro => {
                mostrarToast("Erro de conexão.", "erro");
                btn.innerText = "Criar Conta";
                btn.disabled = false;
            });
        }

        // Função de Validar Código (ETAPA 2)
        function validarCodigo(event) {
            event.preventDefault(); // IMPEDE O NAVEGADOR DE RECARREGAR A TELA

            const btn = document.getElementById('btnCodigo');
            const codigo = document.getElementById('codigo').value;

            btn.innerText = "Verificando...";
            btn.disabled = true;

            fetch('/validar_cadastro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    mostrarToast("Conta criada! Entrando...", "sucesso");
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    mostrarToast(data.mensagem, "erro");
                    btn.innerText = "Verificar e Entrar";
                    btn.disabled = false;
                }
            })
            .catch(erro => {
                mostrarToast("Erro de conexão.", "erro");
                btn.innerText = "Verificar e Entrar";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
</html>

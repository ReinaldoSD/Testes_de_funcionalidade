<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vest.IA</title>

    <link rel="icon" href="/static/logo.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="font-poppins min-h-screen overflow-hidden relative bg-[#0f0720]">

    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute w-96 h-96 bg-purple-600 opacity-20 rounded-full blur-3xl top-[-100px] left-[-100px] animate-pulse"></div>
        <div class="absolute w-96 h-96 bg-fuchsia-500 opacity-20 rounded-full blur-3xl bottom-[-100px] right-[-100px] animate-pulse"></div>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center px-4">

        <div class="w-full max-w-[360px] backdrop-blur-xl bg-white/10 border border-white/20 rounded-[2rem] shadow-2xl p-6 text-white">

            <div class="text-center mb-6">
                <img
                    src="/static/logosemonome.png"
                    alt="Vest.IA"
                    class="w-45 mx-auto drop-shadow-2xl brightness-110"
                >

                <p class="text-blue-100 mt-2 text-sm">
                    Seu guarda-roupa inteligente
                </p>
            </div>

            <form id="formLogin" onsubmit="fazerLogin(event)" class="space-y-4">

                <div>
                    <label class="block mb-1 text-xs text-blue-100 ml-1">
                        E-mail
                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required
                        class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 placeholder-blue-100/30 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400 text-sm"
                    >
                </div>

                <div>
                    <label class="block mb-1 text-xs text-blue-100 ml-1">
                        Senha
                    </label>

                    <input
                        type="password"
                        name="senha"
                        placeholder="Digite sua senha"
                        required
                        class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 placeholder-blue-100/30 text-white focus:outline-none focus:ring-2 focus:ring-fuchsia-400 text-sm"
                    >
                </div>

                <div class="text-right">
                    <a
                        href="/recuperar_senha"
                        class="text-xs text-fuchsia-300 hover:text-fuchsia-200 transition"
                    >
                        Esqueceu a senha?
                    </a>
                </div>

                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:scale-[1.02] active:scale-95 transition duration-300 text-white py-3 rounded-xl font-semibold shadow-lg text-sm"
                >
                    Entrar
                </button>

            </form>

            <div class="mt-6 text-center text-xs text-blue-100">
                Não possui conta?
                <a
                    href="/register"
                    class="font-semibold text-fuchsia-300 hover:text-fuchsia-200 transition"
                >
                    Criar conta
                </a>
            </div>

        </div>

    </div>
    <script>
        function fazerLogin(event) {
            event.preventDefault(); // Impede o navegador de recarregar a página e ir pra tela branca
            
            const email = document.querySelector('input[name="email"]').value;
            const senha = document.querySelector('input[name="senha"]').value;
            const btn = document.querySelector('button[type="submit"]');
            
            btn.innerText = "Verificando...";
            btn.disabled = true;

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    // Aqui podemos até colocar um toast de sucesso antes de redirecionar!
                    mostrarToast("Login efetuado com sucesso! Entrando...", "sucesso");
                    setTimeout(() => window.location.href = '/dashboard', 1000); 
                } else {
                    mostrarToast(data.mensagem, "erro"); // <-- A MÁGICA AQUI
                    btn.innerText = "Entrar";
                    btn.disabled = false;
                }
            })
            .catch(erro => {
                mostrarToast("Erro ao conectar com o servidor.", "erro"); // <-- E AQUI
                btn.innerText = "Entrar";
                btn.disabled = false;
            });
        }
        function mostrarToast(mensagem, tipo = 'erro') {
            // 1. Remove um toast anterior se o usuário clicar várias vezes rápido
            const toastAntigo = document.getElementById('meu-toast');
            if (toastAntigo) toastAntigo.remove();

            // 2. Cria a "caixinha" do toast
            const toast = document.createElement('div');
            toast.id = 'meu-toast';
                    
            // 3. Define a cor e o ícone com base no tipo (erro ou sucesso)
            const corFundo = tipo === 'sucesso' ? 'bg-green-500' : 'bg-red-500';
            const icone = tipo === 'sucesso' ? '✅' : '⚠️';

            // 4. Aplica as classes do Tailwind (flutuante no topo direito, cantos arredondados, sombra)
            toast.className = `fixed top-5 right-5 md:top-10 md:right-10 ${corFundo} text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-x-20 opacity-0 z-50 flex items-center gap-3`;
                    
            toast.innerHTML = `<span class="text-xl">${icone}</span> <span class="font-medium text-sm md:text-base">${mensagem}</span>`;
                    
            document.body.appendChild(toast);

            // 5. Faz a animação de entrada (deslizar para a esquerda e aparecer)
            setTimeout(() => {
                toast.classList.remove('translate-x-20', 'opacity-0');
            }, 10);

            // 6. Faz a animação de saída e remove o elemento após 3.5 segundos
            setTimeout(() => {
                toast.classList.add('translate-x-20', 'opacity-0');
                setTimeout(() => toast.remove(), 500); // Aguarda a animação acabar para deletar do HTML
            }, 3500);
        }
    </script>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    {% for category, message in messages %}
                        // Dispara a sua função mostrarToast existente
                        mostrarToast("{{ message }}", "erro");
                    {% endfor %}
                });
            </script>
        {% endif %}
    {% endwith %}
</body>

</html>
